<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cycle Count</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --amber: #e9a825;
    --red: #c0392b;
    --red-pale: #fdecea;
    --bg: #f4f6f4;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e0e7e0;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    background: var(--green);
    color: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 60px;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .topbar h1 { font-size: 20px; font-weight: 600; flex: 1; }
  .topbar .subtitle { font-size: 13px; opacity: 0.8; }
  .back-btn {
    background: rgba(255,255,255,0.18);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    touch-action: manipulation;
  }
  .back-btn:active { background: rgba(255,255,255,0.3); }
  .lang-btn {
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.5);
    color: white;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    touch-action: manipulation;
  }
  .lang-btn:active { background: rgba(255,255,255,0.3); }

  /* SCREENS */
  .screen { display: none; padding: 24px 20px; max-width: 1200px; margin: 0 auto; }
  .screen.active { display: block; }

  /* UPLOAD */
  .upload-zone {
    border: 3px dashed var(--green-light);
    border-radius: var(--radius);
    padding: 60px 30px;
    text-align: center;
    background: white;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 20px;
    display: block;
  }
  .upload-zone:hover, .upload-zone.drag-over { background: var(--green-pale); }
  .upload-zone svg { color: var(--green); margin-bottom: 14px; }
  .upload-zone p { color: var(--muted); font-size: 17px; margin-top: 8px; }
  .upload-zone strong { color: var(--green); font-size: 20px; display: block; margin-bottom: 6px; }
  #file-input { display: none; }

  .session-banner {
    background: var(--green-pale);
    border: 1px solid var(--green-light);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 15px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .session-banner strong { color: var(--green); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 26px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    touch-action: manipulation;
    transition: opacity 0.15s, transform 0.1s;
    user-select: none;
    text-decoration: none;
  }
  .btn:active { opacity: 0.85; transform: scale(0.98); }
  .btn-primary { background: var(--green); color: white; }
  .btn-secondary { background: white; color: var(--green); border: 2px solid var(--green); }
  .btn-amber { background: var(--amber); color: white; }
  .btn-sm { padding: 9px 16px; font-size: 14px; border-radius: 8px; }
  .btn-full { width: 100%; }

  /* AREA GRID */
  .area-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }
  .area-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    cursor: pointer;
    border: 2px solid transparent;
    touch-action: manipulation;
    transition: border-color 0.15s, transform 0.1s;
  }
  .area-card:active { transform: scale(0.97); }
  .area-card.complete { border-color: var(--green-light); background: var(--green-pale); }
  .area-card .area-letter { font-size: 52px; font-weight: 700; color: var(--green); line-height: 1; }
  .area-card .area-stats { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .area-card .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .area-card .progress-fill { height: 100%; background: var(--green-light); border-radius: 3px; transition: width 0.3s; }

  /* LOCATION LIST */
  .loc-list { display: flex; flex-direction: column; gap: 10px; }
  .loc-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    cursor: pointer;
    touch-action: manipulation;
    border-left: 5px solid var(--border);
    transition: border-color 0.15s;
  }
  .loc-item:active { opacity: 0.85; }
  .loc-item.audited { border-left-color: var(--green-light); }
  .loc-item.partial { border-left-color: var(--amber); }
  .loc-name { font-size: 18px; font-weight: 600; }
  .loc-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .loc-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-done { background: var(--green-pale); color: var(--green); }
  .badge-partial { background: #fef9ee; color: #b7770d; }
  .badge-todo { background: #f3f4f6; color: var(--muted); }

  /* AUDIT */
  .audit-header {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .audit-loc-name { font-size: 22px; font-weight: 700; color: var(--green); }
  .audit-progress { font-size: 14px; color: var(--muted); }
  .plant-cards { display: flex; flex-direction: column; gap: 20px; }

  .plant-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 2px solid var(--border);
    transition: border-color 0.2s;
  }
  .plant-card.saved { border-color: var(--green-light); }
  .plant-card-header {
    background: var(--green);
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .plant-card-header .species { font-size: 17px; font-weight: 600; }
  .plant-card-header .crop-code { font-size: 13px; opacity: 0.85; font-family: monospace; }
  .saved-chip {
    background: var(--green-light);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    display: none;
  }
  .plant-card.saved .saved-chip { display: inline-block; }
  .plant-card-body { display: grid; grid-template-columns: 1fr 1fr; }

  .panel-plantiful { padding: 20px; border-right: 1px solid var(--border); background: #fafafa; }
  .panel-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
  .data-row { margin-bottom: 12px; }
  .data-row .dr-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .data-row .dr-value { font-size: 16px; font-weight: 600; }
  .data-row .dr-value.qty { font-size: 28px; color: var(--green); }

  .panel-entry { padding: 20px; }
  .entry-row {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .entry-row.split-row { border-left: 4px solid var(--amber); }
  .entry-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .entry-row-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  .remove-split {
    background: var(--red-pale);
    border: none;
    color: var(--red);
    font-size: 18px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }

  .loc-input-row { margin-bottom: 10px; }
  .loc-input-row label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  .loc-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    background: white;
    color: var(--text);
  }
  .loc-input:focus { outline: none; border-color: var(--green); }

  .qty-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .qty-field label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
  .qty-field input {
    width: 100%;
    padding: 12px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    background: white;
    color: var(--text);
    -moz-appearance: textfield;
  }
  .qty-field input::-webkit-outer-spin-button,
  .qty-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .qty-field input:focus { outline: none; border-color: var(--green); }
  .qty-field input.alive { border-color: #a8d5b5; }
  .qty-field input.dead { border-color: #f0a8a8; }
  .qty-field input.alive:focus { border-color: var(--green); }
  .qty-field input.dead:focus { border-color: var(--red); }
  .entry-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

  /* EXPORT */
  .export-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 20px;
  }
  .export-card h2 { font-size: 22px; margin-bottom: 8px; }
  .export-card p { color: var(--muted); margin-bottom: 24px; font-size: 15px; line-height: 1.6; }
  .export-stats { display: flex; justify-content: center; gap: 40px; margin-bottom: 28px; }
  .stat-box { text-align: center; }
  .stat-box .num { font-size: 42px; font-weight: 700; color: var(--green); line-height: 1; }
  .stat-box .lbl { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .export-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 15px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    .plant-card-body { grid-template-columns: 1fr; }
    .panel-plantiful { border-right: none; border-bottom: 1px solid var(--border); }
    .area-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1 id="topbar-title">Cycle Count</h1>
  <span id="topbar-sub"></span>
  <button class="back-btn" id="back-btn" style="display:none" onclick="goBack()" data-i18n="back_btn">Back</button>
  <button class="lang-btn" id="lang-btn" onclick="toggleLang()">ES</button>
</div>

<div class="toast" id="toast"></div>

<!-- UPLOAD -->
<div class="screen active" id="screen-upload">
  <div id="session-banner" style="display:none" class="session-banner">
    <div>
      <strong id="session-info"></strong>
      <div style="font-size:13px;color:var(--muted);margin-top:2px" id="session-saved-text"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="goToAreas()" id="btn-continue"></button>
      <button class="btn btn-sm btn-secondary" onclick="clearSession()" id="btn-new-audit"></button>
    </div>
  </div>
  <label for="file-input" class="upload-zone" id="upload-zone">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
    </svg>
    <strong id="upload-title"></strong>
    <p id="upload-subtitle"></p>
  </label>
  <input type="file" id="file-input" onchange="handleFileInput(event)">
</div>

<!-- AREAS -->
<div class="screen" id="screen-areas">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:22px;font-weight:700" id="areas-title"></div>
      <div style="font-size:14px;color:var(--muted);margin-top:2px" id="areas-summary"></div>
    </div>
    <button class="btn btn-amber" onclick="pushNav(goToExport)" id="btn-export-results"></button>
  </div>
  <div class="area-grid" id="area-grid"></div>
</div>

<!-- LOCATIONS -->
<div class="screen" id="screen-locations">
  <div style="font-size:22px;font-weight:700;margin-bottom:4px" id="loc-screen-title"></div>
  <div style="font-size:14px;color:var(--muted);margin-bottom:20px" id="loc-screen-sub"></div>
  <div class="loc-list" id="loc-list"></div>
</div>

<!-- AUDIT -->
<div class="screen" id="screen-audit">
  <div class="audit-header">
    <div>
      <div class="audit-loc-name" id="audit-loc-name"></div>
      <div class="audit-progress" id="audit-progress"></div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="goToLocations(currentArea)" id="btn-back-locations"></button>
  </div>
  <div class="plant-cards" id="plant-cards"></div>
</div>

<!-- EXPORT -->
<div class="screen" id="screen-export">
  <div class="export-card">
    <h2 id="export-title"></h2>
    <p>
      <strong>plantiful_import.csv</strong> — <span id="export-desc-o1"></span><br>
      <strong>audit_analytics.csv</strong> — <span id="export-desc-o2"></span>
    </p>
    <div class="export-stats">
      <div class="stat-box">
        <div class="num" id="export-total">—</div>
        <div class="lbl" id="stat-label-inventory"></div>
      </div>
      <div class="stat-box">
        <div class="num" id="export-audited">—</div>
        <div class="lbl" id="stat-label-audited"></div>
      </div>
    </div>
    <div class="export-btns">
      <button class="btn btn-primary" style="font-size:17px;padding:16px 32px" onclick="downloadPlantiful()" id="btn-download-plantiful"></button>
      <button class="btn btn-secondary" style="font-size:17px;padding:16px 32px" onclick="downloadAnalytics()" id="btn-download-analytics"></button>
    </div>
  </div>
  <button class="btn btn-secondary btn-full" onclick="goToAreas()" id="btn-back-areas"></button>
</div>

<script>
// ── I18N ──────────────────────────────────────────────────────────────────────
const STRINGS = {
  en: {
    app_title:                 'Cycle Count',
    back_btn:                  'Back',
    session_active:            'Session active: {count} inventory rows, {audited} entries audited',
    session_saved:             'Session saved locally - continue or upload a new file to start over',
    btn_continue:              'Continue',
    btn_new_audit:             'New Audit',
    upload_title:              'Upload Plantiful Export',
    upload_subtitle:           'Tap to select a CSV file',
    upload_loading:            'Loading',
    toast_not_csv:             'Please select a CSV file',
    toast_loaded:              'Loaded {count} inventory rows',
    toast_session_cleared:     'Session cleared',
    areas_title:               'Select Area to Audit',
    areas_summary:             '{done} of {total} rows audited',
    btn_export_results:        'Export Results',
    area_card_stats:           '{done} / {total} rows',
    loc_screen_sub:            '{done} of {total} locations fully audited',
    badge_done:                'Done',
    badge_todo:                '{count} plant',
    badge_todo_plural:         '{count} plants',
    audit_topbar:              'Audit',
    audit_progress:            '{done} of {total} saved',
    btn_back_locations:        'Back to Locations',
    panel_label_plantiful:     'Plantiful Record',
    dr_label_location:         'Location',
    dr_label_qty:              'Qty on record',
    dr_label_status:           'Status',
    dr_label_job:              'Job #',
    panel_label_field:         'Field Count',
    entry_label_primary:       'Primary location',
    label_location:            'Location',
    label_alive:               'Alive',
    label_dead:                'Dead',
    placeholder_location:      'e.g. F > 12 > 09',
    split_label:               'Split {n}',
    btn_split:                 'Add Split',
    btn_save:                  'Save',
    btn_clear:                 'Clear',
    saved_chip:                'Saved',
    toast_entry_saved:         'Entry saved',
    toast_entry_cleared:       'Entry cleared',
    export_title:              'Export Cycle Count',
    export_desc_o1:            'Only audited rows - alive qty - ready to upload',
    export_desc_o2:            'Full record with dead counts and discrepancies',
    stat_label_inventory:      'Inventory rows',
    stat_label_audited:        'Rows audited',
    btn_download_plantiful:    'Download Plantiful Import',
    btn_download_analytics:    'Download Analytics',
    btn_back_areas:            'Back to Areas',
    toast_nothing_to_export:   'No audited entries to export',
    toast_plantiful_downloaded:'Plantiful import downloaded',
    toast_analytics_downloaded:'Analytics downloaded',
    lang_toggle_label:         'ES'
  },
  es: {
    app_title:                 'Recuento del Ciclo',
    back_btn:                  'Atras',
    session_active:            'Sesion activa: {count} filas de inventario, {audited} entradas registradas',
    session_saved:             'Sesion guardada localmente - continuar o suba un nuevo archivo para empezar de nuevo',
    btn_continue:              'Continuar',
    btn_new_audit:             'Nuevo Registro',
    upload_title:              'Subir Exportacion de Plantiful',
    upload_subtitle:           'Tap para seleccionar un documento CSV',
    upload_loading:            'Cargando',
    toast_not_csv:             'Por favor seleccione un documento CSV',
    toast_loaded:              'Cargado {count} filas de inventario',
    toast_session_cleared:     'Sesion despejada',
    areas_title:               'Seleccione Area a Registrar',
    areas_summary:             '{done} de {total} filas registradas',
    btn_export_results:        'Exportar Resultados',
    area_card_stats:           '{done} / {total} filas',
    loc_screen_sub:            '{done} de {total} locaciones completamente registradas',
    badge_done:                'Hecho',
    badge_todo:                '{count} planta',
    badge_todo_plural:         '{count} plantas',
    audit_topbar:              'Registrar',
    audit_progress:            '{done} de {total} guardado',
    btn_back_locations:        'Volver a Locaciones',
    panel_label_plantiful:     'Record de Plantiful',
    dr_label_location:         'Locacion',
    dr_label_qty:              'Cantidad en Registro',
    dr_label_status:           'Estatus',
    dr_label_job:              'Job #',
    panel_label_field:         'Recuento de Campo',
    entry_label_primary:       'Locacion Principal',
    label_location:            'Locacion',
    label_alive:               'Vivas',
    label_dead:                'Muertas',
    placeholder_location:      'ejemplo F > 12 > 09',
    split_label:               'Division {n}',
    btn_split:                 'Anadir Division',
    btn_save:                  'Guardar',
    btn_clear:                 'Borrar',
    saved_chip:                'Guardado',
    toast_entry_saved:         'Entrada guardada',
    toast_entry_cleared:       'Entrada borrada',
    export_title:              'Exportar Ciclo Registrado',
    export_desc_o1:            'Solo filas registradas - cantidad viva - listo para subir',
    export_desc_o2:            'Totalmente registrado con plantas muertas y discrepancias',
    stat_label_inventory:      'Filas de Inventario',
    stat_label_audited:        'Filas Registradas',
    btn_download_plantiful:    'Descargar Importacion de Plantiful',
    btn_download_analytics:    'Descargar Analisis',
    btn_back_areas:            'Volver a Areas',
    toast_nothing_to_export:   'No hay entradas registradas para exportar',
    toast_plantiful_downloaded:'Importacion de Plantiful descargada',
    toast_analytics_downloaded:'Analisis descargados',
    lang_toggle_label:         'EN'
  }
};

let lang = localStorage.getItem('cc_lang') || 'en';

function t(key, vars = {}) {
  let s = (STRINGS[lang] && STRINGS[lang][key]) || STRINGS.en[key] || key;
  Object.entries(vars).forEach(([k, v]) => { s = s.replace(new RegExp(`\\{${k}\\}`, 'g'), v); });
  return s;
}

function applyLang() {
  document.getElementById('topbar-title').textContent = t('app_title');
  document.getElementById('back-btn').textContent     = t('back_btn');
  document.getElementById('lang-btn').textContent     = t('lang_toggle_label');
  document.getElementById('session-saved-text').textContent = t('session_saved');
  document.getElementById('btn-continue').textContent  = t('btn_continue');
  document.getElementById('btn-new-audit').textContent = t('btn_new_audit');
  document.getElementById('upload-title').textContent  = t('upload_title');
  document.getElementById('upload-subtitle').textContent = t('upload_subtitle');
  document.getElementById('areas-title').textContent   = t('areas_title');
  document.getElementById('btn-export-results').textContent = t('btn_export_results');
  document.getElementById('btn-back-locations').textContent = t('btn_back_locations');
  document.getElementById('export-title').textContent  = t('export_title');
  document.getElementById('export-desc-o1').textContent = t('export_desc_o1');
  document.getElementById('export-desc-o2').textContent = t('export_desc_o2');
  document.getElementById('stat-label-inventory').textContent = t('stat_label_inventory');
  document.getElementById('stat-label-audited').textContent   = t('stat_label_audited');
  document.getElementById('btn-download-plantiful').textContent = t('btn_download_plantiful');
  document.getElementById('btn-download-analytics').textContent = t('btn_download_analytics');
  document.getElementById('btn-back-areas').textContent = t('btn_back_areas');
  document.documentElement.lang = lang;
  // Re-render dynamic content if a screen is active
  const active = document.querySelector('.screen.active')?.id;
  if (active === 'screen-areas')     goToAreas();
  if (active === 'screen-locations') goToLocations(currentArea);
  if (active === 'screen-audit')     goToAudit(currentLocIndex);
  if (active === 'screen-export')    goToExport();
}

function toggleLang() {
  lang = lang === 'en' ? 'es' : 'en';
  localStorage.setItem('cc_lang', lang);
  applyLang();
}

// ── STORAGE ──────────────────────────────────────────────────────────────────
const STORE = {
  inv:      () => JSON.parse(localStorage.getItem('cc_inv')   || '[]'),
  hdrs:     () => JSON.parse(localStorage.getItem('cc_hdrs')  || '[]'),
  audit:    () => JSON.parse(localStorage.getItem('cc_audit') || '{}'),
  setInv:   v  => localStorage.setItem('cc_inv',   JSON.stringify(v)),
  setHdrs:  v  => localStorage.setItem('cc_hdrs',  JSON.stringify(v)),
  setAudit: v  => localStorage.setItem('cc_audit', JSON.stringify(v)),
  clear:    ()  => ['cc_inv','cc_hdrs','cc_audit'].forEach(k => localStorage.removeItem(k))
};

// ── CSV ──────────────────────────────────────────────────────────────────────
function parseCSV(raw) {
  if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i], n = raw[i+1];
    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && n === '\n')) {
        if (c === '\r') i++;
        row.push(field); field = '';
        if (row.some(f => f !== '')) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field || row.length) { row.push(field); if (row.some(f=>f!=='')) rows.push(row); }
  if (!rows.length) return { headers: [], rows: [] };
  const headers = rows[0];
  const data = rows.slice(1).map(r => {
    const o = {};
    headers.forEach((h, i) => o[h] = (r[i] || '').trim());
    return o;
  });
  return { headers, rows: data };
}

function toCSV(headers, rows) {
  const esc = v => {
    const s = String(v ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n'))
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return [headers.map(esc).join(','),
    ...rows.map(r => headers.map(h => esc(r[h] ?? '')).join(','))
  ].join('\r\n');
}

function downloadCSV(filename, content) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
let screenStack = [];

function showScreen(id, title, sub, showBack) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('topbar-title').textContent = title || t('app_title');
  document.getElementById('topbar-sub').textContent   = sub || '';
  document.getElementById('back-btn').style.display   = showBack ? 'flex' : 'none';
  window.scrollTo(0, 0);
}

function pushNav(fn) { screenStack.push(fn); fn(); }
function goBack() {
  if (screenStack.length > 1) { screenStack.pop(); screenStack[screenStack.length-1](); }
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentArea = null;
let currentLocData = [];
let currentLocIndex = 0;

// ── BOOT ──────────────────────────────────────────────────────────────────────
function init() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  applyLang();

  screenStack = [() => showScreen('screen-upload', t('app_title'), '', false)];
  showScreen('screen-upload', t('app_title'), '', false);

  const inv   = STORE.inv();
  const audit = STORE.audit();
  if (inv.length) {
    document.getElementById('session-banner').style.display = 'flex';
    document.getElementById('session-info').textContent =
      t('session_active', { count: inv.length, audited: Object.keys(audit).length });
  }

  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0]; if (f) loadFile(f);
  });
}

function handleFileInput(e) { const f = e.target.files[0]; if (f) loadFile(f); }

async function loadFile(file) {
  if (!file.name.toLowerCase().endsWith('.csv')) { showToast(t('toast_not_csv')); return; }
  document.getElementById('upload-title').textContent   = t('upload_loading');
  document.getElementById('upload-subtitle').textContent = '';
  const text = await file.text();
  const { headers, rows } = parseCSV(text);
  STORE.setInv(rows); STORE.setHdrs(headers); STORE.setAudit({});
  showToast(t('toast_loaded', { count: rows.length }));
  screenStack = [];
  pushNav(goToAreas);
}

function clearSession() {
  STORE.clear();
  document.getElementById('session-banner').style.display = 'none';
  document.getElementById('upload-title').textContent    = t('upload_title');
  document.getElementById('upload-subtitle').textContent = t('upload_subtitle');
  showToast(t('toast_session_cleared'));
}

// ── AREAS ─────────────────────────────────────────────────────────────────────
function goToAreas() {
  showScreen('screen-areas', t('app_title'), '', false);

  const inv   = STORE.inv();
  const audit = STORE.audit();
  const areaMap = {};
  inv.forEach(row => {
    const area = (row['Locations'] || '').split('>')[0].trim();
    if (!area) return;
    if (!areaMap[area]) areaMap[area] = { total: 0, done: 0 };
    areaMap[area].total++;
    if (audit[`${row['Crop code']}||${row['Locations'].trim()}`]) areaMap[area].done++;
  });

  const areas = Object.keys(areaMap).sort();
  let totalDone = 0, totalAll = 0;
  areas.forEach(a => { totalDone += areaMap[a].done; totalAll += areaMap[a].total; });
  document.getElementById('areas-summary').textContent =
    t('areas_summary', { done: totalDone, total: totalAll });

  document.getElementById('area-grid').innerHTML = areas.map(area => {
    const { total, done } = areaMap[area];
    const pct = total ? Math.round((done / total) * 100) : 0;
    const cls = done === total && total > 0 ? 'complete' : '';
    return `<div class="area-card ${cls}" onclick="pushNav(()=>goToLocations('${area}'))">
      <div class="area-letter">${area}</div>
      <div class="area-stats">${t('area_card_stats', { done, total })}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

// ── LOCATIONS ─────────────────────────────────────────────────────────────────
function goToLocations(area) {
  currentArea = area;
  showScreen('screen-locations', `${t('audit_topbar')} — ${area}`, '', true);

  const inv   = STORE.inv();
  const audit = STORE.audit();
  const locMap = {};
  inv.forEach(row => {
    const loc = (row['Locations'] || '').trim();
    if (loc.split('>')[0].trim() !== area) return;
    locMap[loc] = locMap[loc] || [];
    locMap[loc].push(row);
  });

  currentLocData = Object.keys(locMap).sort().map(loc => {
    const plants  = locMap[loc];
    const entries = plants.map(p => ({
      plant: p,
      audit: audit[`${p['Crop code']}||${loc}`] || null
    }));
    return { location: loc, entries, audited: entries.filter(e => e.audit).length, total: entries.length };
  });

  const fullyDone = currentLocData.filter(l => l.audited === l.total).length;
  document.getElementById('loc-screen-title').textContent = `Area ${area}`;
  document.getElementById('loc-screen-sub').textContent   =
    t('loc_screen_sub', { done: fullyDone, total: currentLocData.length });

  document.getElementById('loc-list').innerHTML = currentLocData.map((loc, i) => {
    const complete = loc.audited === loc.total && loc.total > 0;
    const partial  = loc.audited > 0 && loc.audited < loc.total;
    const cls   = complete ? 'audited' : partial ? 'partial' : '';
    const badge = complete
      ? `<span class="loc-badge badge-done">${t('badge_done')}</span>`
      : partial
      ? `<span class="loc-badge badge-partial">${loc.audited}/${loc.total}</span>`
      : `<span class="loc-badge badge-todo">${t(loc.total === 1 ? 'badge_todo' : 'badge_todo_plural', { count: loc.total })}</span>`;
    const species = loc.entries.map(e => e.plant['Species'] || e.plant['Product'] || '').filter(Boolean).join(' · ');
    return `<div class="loc-item ${cls}" onclick="pushNav(()=>goToAudit(${i}))">
      <div>
        <div class="loc-name">${loc.location}</div>
        <div class="loc-meta">${species}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

// ── AUDIT ─────────────────────────────────────────────────────────────────────
function goToAudit(locIndex) {
  currentLocIndex = locIndex;
  const loc = currentLocData[locIndex];
  showScreen('screen-audit', t('audit_topbar'), loc.location, true);
  document.getElementById('audit-loc-name').textContent = loc.location;
  renderAuditProgress();
  document.getElementById('plant-cards').innerHTML =
    loc.entries.map((entry, i) => buildPlantCard(entry, i, loc.location)).join('');
}

function renderAuditProgress() {
  const loc = currentLocData[currentLocIndex];
  document.getElementById('audit-progress').textContent =
    t('audit_progress', { done: loc.audited, total: loc.entries.length });
}

function buildPlantCard(entry, idx, defaultLoc) {
  const p       = entry.plant;
  const audit   = entry.audit;
  const cropCode = p['Crop code'];
  const origLoc  = (p['Locations'] || '').trim();

  const formEntries = audit
    ? audit.entries
    : [{ location: origLoc, alive_qty: '', dead_qty: '' }];

  const primary   = formEntries[0];
  const splitRows = formEntries.slice(1).map((e, si) =>
    buildSplitRow(idx, si + 1, e.location, e.alive_qty, e.dead_qty)
  ).join('');

  const savedCls = audit ? 'saved' : '';
  const clearBtn = audit
    ? `<button class="btn btn-sm" style="background:#f3f4f6;color:var(--red)" onclick="clearEntry(${idx})">${t('btn_clear')}</button>` : '';

  return `<div class="plant-card ${savedCls}" id="card-${idx}" data-crop="${esc(cropCode)}" data-orig-loc="${esc(origLoc)}">
    <div class="plant-card-header">
      <div>
        <div class="species">${p['Species'] || p['Product'] || '—'}</div>
        <div class="crop-code">${cropCode} · ${p['Variant']||''} ${p['Current size']||''}</div>
      </div>
      <span class="saved-chip">${t('saved_chip')}</span>
    </div>
    <div class="plant-card-body">
      <div class="panel-plantiful">
        <div class="panel-label">${t('panel_label_plantiful')}</div>
        <div class="data-row"><div class="dr-label">${t('dr_label_location')}</div><div class="dr-value">${p['Locations']}</div></div>
        <div class="data-row"><div class="dr-label">${t('dr_label_qty')}</div><div class="dr-value qty">${p['Available qty']}</div></div>
        <div class="data-row"><div class="dr-label">${t('dr_label_status')}</div><div class="dr-value">${p['Status']||'—'}</div></div>
        <div class="data-row"><div class="dr-label">${t('dr_label_job')}</div><div class="dr-value">${p['Job #']||'—'}</div></div>
      </div>
      <div class="panel-entry">
        <div class="panel-label">${t('panel_label_field')}</div>
        <div class="entry-row" id="entry-primary-${idx}">
          <div class="entry-row-header"><span class="entry-row-label">${t('entry_label_primary')}</span></div>
          <div class="loc-input-row">
            <label>${t('label_location')}</label>
            <input class="loc-input" id="loc-0-${idx}" type="text" value="${esc(primary.location)}">
          </div>
          <div class="qty-row">
            <div class="qty-field"><label>${t('label_alive')}</label>
              <input class="alive" id="alive-0-${idx}" type="number" min="0" inputmode="numeric"
                value="${primary.alive_qty !== '' ? primary.alive_qty : ''}" placeholder="0">
            </div>
            <div class="qty-field"><label>${t('label_dead')}</label>
              <input class="dead" id="dead-0-${idx}" type="number" min="0" inputmode="numeric"
                value="${primary.dead_qty !== '' ? primary.dead_qty : ''}" placeholder="0">
            </div>
          </div>
        </div>
        <div id="splits-${idx}">${splitRows}</div>
        <div class="entry-actions">
          <button class="btn btn-secondary btn-sm" onclick="addSplit(${idx},'${esc(origLoc)}')">${t('btn_split')}</button>
          <button class="btn btn-primary btn-sm" onclick="saveEntry(${idx})">${t('btn_save')}</button>
          ${clearBtn}
        </div>
      </div>
    </div>
  </div>`;
}

const splitCounters = {};

function addSplit(cardIdx, defaultLoc) {
  const n = (splitCounters[cardIdx] = (splitCounters[cardIdx] || 0) + 1);
  document.getElementById(`splits-${cardIdx}`)
    .insertAdjacentHTML('beforeend', buildSplitRow(cardIdx, n, defaultLoc, '', ''));
}

function buildSplitRow(cardIdx, si, loc, alive, dead) {
  return `<div class="entry-row split-row" id="split-${cardIdx}-${si}">
    <div class="entry-row-header">
      <span class="entry-row-label">${t('split_label', { n: si })}</span>
      <button class="remove-split" onclick="document.getElementById('split-${cardIdx}-${si}').remove()">x</button>
    </div>
    <div class="loc-input-row">
      <label>${t('label_location')}</label>
      <input class="loc-input" id="loc-${si}-${cardIdx}" type="text" value="${esc(loc)}" placeholder="${t('placeholder_location')}">
    </div>
    <div class="qty-row">
      <div class="qty-field"><label>${t('label_alive')}</label>
        <input class="alive" id="alive-${si}-${cardIdx}" type="number" min="0" inputmode="numeric" value="${alive}" placeholder="0">
      </div>
      <div class="qty-field"><label>${t('label_dead')}</label>
        <input class="dead" id="dead-${si}-${cardIdx}" type="number" min="0" inputmode="numeric" value="${dead}" placeholder="0">
      </div>
    </div>
  </div>`;
}

function collectEntries(cardIdx) {
  const entries = [];
  const val = id => document.getElementById(id)?.value ?? '';
  entries.push({
    location:  val(`loc-0-${cardIdx}`).trim(),
    alive_qty: val(`alive-0-${cardIdx}`) || 0,
    dead_qty:  val(`dead-0-${cardIdx}`)  || 0
  });
  document.getElementById(`splits-${cardIdx}`)
    .querySelectorAll('.split-row').forEach(row => {
      const si  = row.id.split('-').pop();
      const loc = val(`loc-${si}-${cardIdx}`).trim();
      if (loc) entries.push({
        location:  loc,
        alive_qty: val(`alive-${si}-${cardIdx}`) || 0,
        dead_qty:  val(`dead-${si}-${cardIdx}`)  || 0
      });
    });
  return entries;
}

function saveEntry(cardIdx) {
  const card     = document.getElementById(`card-${cardIdx}`);
  const cropCode = card.dataset.crop;
  const origLoc  = card.dataset.origLoc;
  const entries  = collectEntries(cardIdx);

  const audit = STORE.audit();
  audit[`${cropCode}||${origLoc}`] = {
    crop_code: cropCode, original_location: origLoc,
    entries, timestamp: new Date().toISOString()
  };
  STORE.setAudit(audit);

  card.classList.add('saved');
  card.querySelector('.saved-chip').style.display = 'inline-block';

  const loc = currentLocData[currentLocIndex];
  loc.entries[cardIdx].audit = audit[`${cropCode}||${origLoc}`];
  loc.audited = loc.entries.filter(e => e.audit).length;

  card.querySelector('.entry-actions').innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="addSplit(${cardIdx},'${esc(origLoc)}')">${t('btn_split')}</button>
    <button class="btn btn-primary btn-sm" onclick="saveEntry(${cardIdx})">${t('btn_save')}</button>
    <button class="btn btn-sm" style="background:#f3f4f6;color:var(--red)" onclick="clearEntry(${cardIdx})">${t('btn_clear')}</button>`;

  showToast(t('toast_entry_saved'));
  renderAuditProgress();
}

function clearEntry(cardIdx) {
  const card     = document.getElementById(`card-${cardIdx}`);
  const cropCode = card.dataset.crop;
  const origLoc  = card.dataset.origLoc;

  const audit = STORE.audit();
  delete audit[`${cropCode}||${origLoc}`];
  STORE.setAudit(audit);

  const loc = currentLocData[currentLocIndex];
  loc.entries[cardIdx].audit = null;
  loc.audited = loc.entries.filter(e => e.audit).length;

  card.outerHTML = buildPlantCard(loc.entries[cardIdx], cardIdx, loc.location);
  renderAuditProgress();
  showToast(t('toast_entry_cleared'));
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function goToExport() {
  showScreen('screen-export', t('export_title'), '', true);
  const inv   = STORE.inv();
  const audit = STORE.audit();
  document.getElementById('export-total').textContent   = inv.length;
  document.getElementById('export-audited').textContent = Object.keys(audit).length;
}

function buildOutputs() {
  const inv   = STORE.inv();
  const hdrs  = STORE.hdrs();
  const audit = STORE.audit();
  const o1 = [], o2 = [];

  Object.values(audit).forEach(a => {
    const orig    = inv.find(r => r['Crop code'] === a.crop_code && r['Locations'].trim() === a.original_location);
    const origQty = parseInt(orig?.['Available qty'] || '0', 10) || 0;

    a.entries.forEach(e => {
      const alive = parseInt(e.alive_qty, 10) || 0;
      const dead  = parseInt(e.dead_qty,  10) || 0;
      if (orig) o1.push({ ...orig, 'Available qty': String(alive), 'Locations': e.location });
      o2.push({
        'Crop code': a.crop_code,
        'Species': orig?.['Species'] || '',
        'Original location': a.original_location,
        'Audited location': e.location,
        'Original Plantiful qty': origQty,
        'Alive qty (field)': alive,
        'Dead qty': dead,
        'Total counted': alive + dead,
        'Discrepancy (alive vs Plantiful)': alive - origQty,
        'Audit timestamp': a.timestamp
      });
    });
  });
  return { o1, o2, hdrs };
}

function downloadPlantiful() {
  const { o1, hdrs } = buildOutputs();
  if (!o1.length) { showToast(t('toast_nothing_to_export')); return; }
  const stamp = new Date().toISOString().slice(0,16).replace('T','_').replace(':','');
  downloadCSV(`plantiful_import_${stamp}.csv`, toCSV(hdrs, o1));
  showToast(t('toast_plantiful_downloaded'));
}

function downloadAnalytics() {
  const { o2 } = buildOutputs();
  if (!o2.length) { showToast(t('toast_nothing_to_export')); return; }
  const o2hdrs = ['Crop code','Species','Original location','Audited location',
    'Original Plantiful qty','Alive qty (field)','Dead qty',
    'Total counted','Discrepancy (alive vs Plantiful)','Audit timestamp'];
  const stamp = new Date().toISOString().slice(0,16).replace('T','_').replace(':','');
  downloadCSV(`audit_analytics_${stamp}.csv`, toCSV(o2hdrs, o2));
  showToast(t('toast_analytics_downloaded'));
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

init();
</script>
